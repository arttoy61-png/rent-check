<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>강서구 아파트 실거래 | 렌트체크 강서</title>
<meta name="description" content="강서구 8개 동, 아파트 실거래를 동·단지·평형 순서로 확인합니다. 매일 갱신.">
<meta property="og:title" content="강서구 아파트 실거래 | 렌트체크 강서">
<meta property="og:description" content="동을 고르고, 단지를 고르면 매매·전세·월세가 한 화면에. 회원가입 없음.">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-MPRR3J99YQ"></script>
<script>
window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}
gtag('js',new Date());gtag('config','G-MPRR3J99YQ');
</script>
<style>
:root{--navy:#0d1f3c;--navy2:#15294d;--gold:#d4a73a;--gold-bright:#f0c75e;--gold-deep:#b8860b;
--blue:#1565c0;--ink:#1c2733;--muted:#8a8270;--line:#e7e2d6;--soft:#f4efe4;
--paper:#fff;--bg:#faf8f3;--up:#c4661f;--green:#2e8b57;--radius:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",sans-serif;
background:var(--bg);color:var(--ink);line-height:1.55;-webkit-text-size-adjust:100%}
.wrap{max-width:680px;margin:0 auto;padding:14px 12px 40px}
/* 헤더 */
.hd{background:linear-gradient(135deg,#0d1f3c,#17406e);border-radius:var(--radius);
padding:18px 16px 16px;color:#fff;margin-bottom:10px}
.hd h1{font-size:19px;font-weight:900;letter-spacing:-.4px}
.hd h1 b{color:var(--gold)}
.hd .sub{font-size:12.5px;color:#e2d9c4;margin-top:4px}
.crumbbar{position:sticky;top:0;z-index:60;background:var(--navy);
margin:0 -12px 10px;padding:9px 12px;box-shadow:0 2px 10px rgba(13,31,60,.28)}
.crumb{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:14px}
.crumb a{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.16);
border:1.5px solid rgba(255,233,184,.55);color:#ffe9b8;font-weight:800;padding:7px 13px;
border-radius:999px;text-decoration:none;cursor:pointer;min-height:36px;box-sizing:border-box}
.crumb a:hover{background:rgba(255,255,255,.3)}
.crumb .sep{color:#b09f7a}
.crumb .cur{color:#fff;font-weight:800;padding:0 3px}
/* 검색 */
.search{position:relative;margin:10px 0 12px}
.search input{width:100%;min-height:46px;border:1.5px solid var(--line);border-radius:12px;
padding:10px 40px 10px 14px;font-size:15px;background:var(--paper);color:var(--ink)}
.search input:focus{outline:none;border-color:var(--blue)}
.search .ic{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}
.sres{background:var(--paper);border:1.5px solid var(--line);border-radius:12px;margin-top:6px;overflow:hidden}
.sres .it{display:flex;justify-content:space-between;align-items:center;gap:8px;
padding:11px 13px;border-top:1px solid #efe9dc;cursor:pointer;font-size:14px}
.sres .it:first-child{border-top:0}
.sres .it:active{background:var(--soft)}
.sres .nm{font-weight:800;color:var(--navy)}
.sres .mi{font-size:12px;color:var(--muted)}
.badge-few{display:inline-block;font-size:10.5px;font-weight:800;color:#9a6d0b;
background:#fff6dd;border:1px solid #eadba7;border-radius:99px;padding:1.5px 7px;margin-left:5px;vertical-align:1px}
/* 카드 공통 */

.rtline{display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:12.5px}
.rtline b{color:var(--green);font-weight:900}
.rtsub{color:var(--muted);font-weight:600}
.fixbar{display:none}
@media(max-width:719px){
 .fixbar.on{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:70;gap:8px;
 padding:8px 12px calc(8px + env(safe-area-inset-bottom));background:rgba(250,248,243,.97);
 border-top:1.5px solid var(--line);box-shadow:0 -3px 14px rgba(13,31,60,.1)}
 .fixbar button,.fixbar a{flex:1;min-height:46px;display:flex;align-items:center;justify-content:center;
 border-radius:12px;font-size:14px;font-weight:900;text-decoration:none;cursor:pointer;border:none}
 .fixbar .mo{background:#fff;border:1.5px solid var(--blue);color:var(--blue)}
 .fixbar .db{background:var(--navy);color:var(--gold-bright)}
 .detpad{padding-bottom:70px}
}
.sortrow{display:flex;gap:6px;overflow-x:auto;padding:2px 0 9px;-webkit-overflow-scrolling:touch}
.sortrow::-webkit-scrollbar{display:none}
.sortbtn{flex-shrink:0;border:1.5px solid;background:#fff;font-size:12.5px;font-weight:800;padding:8px 13px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.15s}
.sortbtn.on{color:#fff}
.sortbtn.s-recent{border-color:#2ea06e;color:#2ea06e}
.sortbtn.s-recent.on{background:#2ea06e}
.sortbtn.s-price{border-color:#e08232;color:#e08232}
.sortbtn.s-price.on{background:#e08232}
.sortbtn.s-pyeong{border-color:#7a5cd2;color:#7a5cd2}
.sortbtn.s-pyeong.on{background:#7a5cd2}
.sortbtn.s-year{border-color:#46b9cd;color:#46b9cd}
.sortbtn.s-year.on{background:#46b9cd}
.sortbtn.s-deals{border-color:#b8860b;color:#b8860b}
.sortbtn.s-deals.on{background:#d4a73a;border-color:#d4a73a;color:#0d1f3c}
.sortlab{flex-shrink:0;align-self:center;font-size:12.5px;font-weight:700;color:var(--muted);margin-right:3px}
.rank{flex-shrink:0;width:27px;height:27px;border-radius:50%;background:var(--navy);color:#f0c75e;
font-size:13.5px;font-weight:900;display:flex;align-items:center;justify-content:center;margin-right:9px}
.rank.gold{background:linear-gradient(135deg,var(--gold-deep),var(--gold-bright));color:var(--navy)}
.led{display:inline-block;width:7px;height:7px;border-radius:50%;background:#0f7a4a;
flex-shrink:0;animation:ledbl 1.5s infinite}
@keyframes ledbl{0%,100%{opacity:1}50%{opacity:.25}}
.rcline{display:flex;align-items:center;gap:6px;margin-top:7px;font-size:12.5px;flex-wrap:wrap}
.rdate{color:#0f7a4a;font-weight:900}
.ttag{font-weight:800;font-size:11.5px;padding:1.5px 7px;border-radius:5px;color:#fff}
.ttag.sale{background:var(--orange)}.ttag.je{background:var(--blue)}.ttag.wo{background:#b8860b}
.rspec{color:var(--ink);font-weight:700}
.rcamt{font-size:17px;font-weight:900}
.rcamt.sale{color:var(--orange)}.rcamt.je{color:var(--blue)}.rcamt.wo{color:#b8860b}
.card{background:var(--paper);border:1.5px solid var(--line);border-radius:var(--radius);
padding:13px 15px;margin-bottom:9px;cursor:pointer;box-shadow:0 1px 5px rgba(13,31,60,.05);
transition:border-color .12s,box-shadow .12s}
.card:hover{border-color:var(--blue);box-shadow:0 3px 12px rgba(21,101,192,.14)}
.hint{margin-top:7px;font-size:12px;font-weight:800;color:var(--blue)}
.card:active{border-color:var(--blue);background:#fffdf7}
.rowline{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
/* 동 카드 */
.dc .nm{font-size:16.5px;font-weight:900;color:var(--navy)}
.dc .go{color:var(--blue);font-weight:900;font-size:15px}
.dc .st{display:flex;gap:14px;margin-top:7px;font-size:13px;color:var(--muted)}
.dc .st b{color:var(--ink);font-weight:800}
/* 요약줄 */
.sumline{background:var(--soft);border:1.5px solid var(--gold);border-radius:12px;
padding:10px 14px;font-size:13px;color:#5c4d2e;margin-bottom:10px}
.sumline b{color:var(--navy)}
/* 단지 카드 */
.ac .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.ac .nm{font-size:15.5px;font-weight:900;color:var(--navy);letter-spacing:-.3px}
.ac .meta{font-size:11.5px;color:var(--muted);margin-top:2px}
.ac .last{text-align:right;flex-shrink:0}
.ac .last b{font-size:16px;font-weight:900;color:var(--navy)}
.ac .last .d{display:block;font-size:11px;color:var(--muted)}
.ac .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px;
border-top:1px solid #efe9dc;padding-top:9px}
.ac .g .k{font-size:10.5px;color:var(--muted);font-weight:700}
.ac .g .v{font-size:13.5px;font-weight:800;color:var(--ink);margin-top:1px}
.ac .g .v.gold{color:#9a6d0b}
.more{display:block;width:100%;min-height:46px;background:var(--paper);border:1.5px solid var(--line);
border-radius:12px;font-size:14px;font-weight:800;color:var(--blue);cursor:pointer;margin:2px 0 8px}
/* 상세 */
.det{background:var(--paper);border:1.5px solid var(--line);border-radius:var(--radius);padding:16px 15px}
.det h2{font-size:18px;font-weight:900;color:var(--navy);letter-spacing:-.3px}
.det .meta{font-size:12.5px;color:var(--muted);margin-top:3px}
.bands{display:flex;gap:7px;flex-wrap:wrap;margin:13px 0 4px}
.bands button{min-height:40px;padding:7px 13px;border-radius:99px;border:1.5px solid var(--line);
background:var(--paper);font-size:13.5px;font-weight:800;color:var(--ink);cursor:pointer}
.bands button.on{background:var(--navy);border-color:var(--navy);color:#fff}
.bands button .n{font-size:10.5px;color:var(--muted);font-weight:700;margin-left:3px}
.bands button.on .n{color:#ffd98a}
.tabs{display:flex;gap:6px;margin:10px 0 8px}
.tabs button{flex:1;min-height:42px;border-radius:10px;border:1.5px solid var(--line);
background:var(--paper);font-size:13.5px;font-weight:800;color:var(--muted);cursor:pointer}
.tabs button.on{border-color:var(--gold-deep);color:var(--gold-deep);background:#fdf8ec}
.kv{display:flex;gap:12px;margin:6px 0 10px;font-size:13px;color:var(--muted)}
.kv b{color:var(--navy);font-weight:900}
table.deals{width:100%;border-collapse:collapse;font-size:13.5px}
table.deals th{background:var(--navy);color:#fff;padding:8px 6px;font-size:12px;font-weight:800}
table.deals td{padding:8px 6px;border-bottom:1px solid #efe9dc;text-align:center}
table.deals td.dt{color:var(--muted);font-size:12.5px}
table.deals td b{font-weight:900;color:var(--navy)}
.note{font-size:12px;color:var(--muted);line-height:1.7;margin-top:10px}
.back{display:block;width:100%;min-height:46px;margin-top:14px;border-radius:12px;
border:1.5px solid var(--line);background:var(--paper);font-size:14px;font-weight:800;color:var(--ink);cursor:pointer}
#map{height:210px;border-radius:12px;margin-top:13px;border:1.5px solid var(--line)}
/* CTA */
.cta{margin-top:16px;background:var(--paper);border:2px solid var(--blue);border-radius:var(--radius);
padding:15px 16px;font-size:14px;line-height:1.8}
.cta b{color:var(--navy)}
.cta a{color:var(--blue);font-weight:900;text-decoration:none}
.foot{margin-top:16px;text-align:center}
.foot p{font-size:11.5px;color:var(--muted);line-height:1.85;margin:0}
.foot .brand{display:inline-block;margin-top:12px;padding-top:12px;border-top:1.5px solid var(--line);
color:var(--gold-deep);font-size:16px;font-weight:900;text-decoration:none;letter-spacing:-.3px}
.foot .brand span{display:block;font-size:11.5px;color:var(--muted);font-weight:700;margin-top:2px;letter-spacing:0}
.ld{text-align:center;color:var(--muted);padding:30px 0;font-size:14px}
.hide{display:none}
@media(min-width:520px){.ac .grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <h1>강서구 아파트 <b>실거래</b></h1>
    <div class="sub">동을 고르고, 단지를 고르면 매매·전세·월세가 한 화면에 · 매일 갱신</div>
  </div>

  <div class="crumbbar"><div class="crumb" id="crumb"></div></div>

  <div class="search">
    <input id="q" type="search" placeholder="단지명 검색 (예: 강서힐스테이트)" autocomplete="off">
    <span class="ic">🔍</span>
  </div>
  <div id="sres" class="sres hide"></div>

  <div id="view" class="ld">데이터 불러오는 중…</div>

  <div class="fixbar" id="fixbar"></div>

  <div class="cta">
    📊 <b>강서구 실거래 기록 대시보드</b><br>
    동별 거래 흐름·재개발 현황·무료 도구를 한 페이지에서. 회원가입 없습니다.<br>
    <a href="dashboard.html">👉 대시보드 바로 보기</a>
  </div>
  <div class="foot">
    <p>자료 · 국토교통부 실거래가 공개시스템 · 계약일 기준</p>
    <p>신고 지연으로 최근 거래는 계속 추가됩니다</p>
    <p>표본 3건 미만은 중위값을 표시하지 않습니다</p>
    <a class="brand" href="https://blog.naver.com/spitoon61" target="_blank" rel="noopener">렌트체크강서 ›<span>실거래로 더 정확하게</span></a>
  </div>
</div>

<script>
let S=null, DET=null, state={view:'dong', dong:null, id:null, showAll:false, sort:'recent'};
const $=s=>document.querySelector(s);
const norm=s=>String(s||'').replace(/[,\s·()]/g,'').toLowerCase();
const eok=v=>v==null?'-':(v<1?Math.round(v*10000).toLocaleString()+'만원'
  :v.toFixed(v>=10?1:2).replace(/\.?0+$/,'')+'억');
const ga=(ev,p)=>{try{gtag('event',ev,p||{});}catch(e){}};

fetch('gangseo_apt_summary.json',{cache:'no-cache'})
 .then(r=>r.json()).then(d=>{S=d;render();})
 .catch(()=>{$('#view').textContent='데이터를 불러오지 못했습니다. 잠시 후 새로고침해 주세요.';});

function setCrumb(){
  const c=$('#crumb'); let h='<a onclick="goDong()">‹ 강서구</a>';
  if(state.dong){h+='<span class="sep">›</span>';
    h+= state.view==='list' ? '<span class="cur">'+state.dong+'</span>' : '<a onclick="goList(\''+state.dong+'\')">‹ '+state.dong+'</a>';}
  if(state.view==='detail'&&DET_CUR){h+='<span class="sep">›</span><span class="cur">'+DET_CUR.nm+'</span>';}
  c.innerHTML=h;
}
function goDong(){state={view:'dong',dong:null,id:null,showAll:false,sort:'recent'};render();window.scrollTo(0,0);}
function goList(d){state={view:'list',dong:d,id:null,showAll:false,sort:state.sort||'recent'};render();window.scrollTo(0,0);ga('dong_click',{dong:d});}
function goDetail(id){state.view='detail';state.id=id;state.deals=0;render();window.scrollTo(0,0);}

function render(){
  setCrumb();
  if(state.view==='dong')return renderDong();
  if(state.view==='list')return renderList();
  return renderDetail();
}

/* ── 첫 화면: 동 카드 ── */
function renderDong(){
  DET_CUR=null;setCrumb();
  let h='';
  [...S.dongs].sort((a,b)=>b.n-a.n).forEach(d=>{
    h+='<div class="card dc" onclick="goList(\''+d.dong+'\')"><div class="rowline">'
     +'<span class="nm">'+d.dong+'</span><span class="go">›</span></div>'
     +'<div class="st"><span>단지 <b>'+d.n+'</b>개</span><span>6개월 매매 <b>'+d.sale6+'</b>건</span>'
     +'<span>중위 <b>'+eok(d.mid)+'</b></span></div>'
     +'<div class="hint">누르시면 아파트 목록이 나옵니다 ›</div></div>';
  });
  h+='<div class="note">단지 수는 최근 6개월 거래 3건 이상 기준입니다. 그 밖의 단지는 위 검색으로 찾을 수 있습니다.</div>';
  $('#view').className='';$('#view').innerHTML=h;
  $('#fixbar').className='fixbar';
}

/* ── 동 화면: 단지 목록 ── */
function renderList(){
  DET_CUR=null;setCrumb();
  const all=S.complexes.filter(c=>c.dong===state.dong&&!c.few);
  const k=state.sort||'recent';
  const val=(c)=>({price:c.mid,pyeong:c.ppy,year:c.yr,deals:c.tot}[k]);
  const sorted=[...all].sort((a,b)=>k==='recent'
    ? ((b.rc&&b.rc.d)||'0').localeCompare((a.rc&&a.rc.d)||'0')
    : ((val(b)==null?-1:val(b))-(val(a)==null?-1:val(a))));
  const list=state.showAll?sorted:sorted.slice(0,15);
  const d=S.dongs.find(x=>x.dong===state.dong)||{};
  const B=[['recent','최신거래순'],['price','매매가순'],['pyeong','평당가순'],['year','신축순'],['deals','거래량순']];
  let h='<div class="rtline"><span class="led"></span><b>실시간 반영</b><span class="rtsub">국토부 신고분 매일 갱신</span></div>';
  h+='<div class="sortrow"><span class="sortlab">정렬</span>'+B.map(b=>'<button class="sortbtn s-'+b[0]+(k===b[0]?' on':'')+'" onclick="setSort(\''+b[0]+'\')">'+(b[0]==='recent'?'🟢 ':'')+b[1]+'</button>').join('')+'</div>';
  h+='<div class="sumline"><b>'+state.dong+'</b> · 단지 <b>'+(d.n||all.length)+'</b>개 · 6개월 매매 <b>'+(d.sale6||'-')+'</b>건 · 매매 중위 <b>'+eok(d.mid)+'</b></div>';
  list.forEach((c,i)=>{h+=aptCard(c,k,i+1);});
  if(!state.showAll&&sorted.length>15)
    h+='<button class="more" onclick="state.showAll=true;render()">'+state.dong+' '+sorted.length+'개 단지 모두 보기</button>';
  h+='<button class="back" onclick="goDong()">‹ 다른 동 고르기</button>';
  $('#view').className='';$('#view').innerHTML=h;
  $('#fixbar').className='fixbar';
}
function setSort(k){state.sort=k;state.showAll=false;render();ga('sort_use',{sort:k,dong:state.dong});}
function aptCard(c,k,rk){
  const TY={sale:['매매','sale'],je:['전세','je'],wo:['월세','wo']};
  const badge=rk?'<div class="rank'+(rk<=3?' gold':'')+'">'+rk+'</div>':'';
  const head='<div class="top" style="display:flex;align-items:flex-start">'+badge
   +'<div style="flex:1"><div class="nm">'+c.nm+'</div>'
   +'<div class="meta">'+c.dong+' · '+(c.yr?c.yr+'년':'준공 미상')+(c.un?' · '+c.un.toLocaleString()+'세대':'')+'</div></div>';
  if(k==='recent'&&c.rc){
    const r=c.rc,tn=TY[r.t][0],tc=TY[r.t][1];
    const amt=r.t==='wo'?eok(r.a)+' / '+r.r+'만':eok(r.a);
    return '<div class="card ac" onclick="goDetail(\''+c.id+'\')">'+head
     +'<div style="text-align:right"><div class="rcamt '+tc+'">'+amt+'</div>'
     +'<div style="font-size:11.5px;color:#98a4b1;font-weight:700">'+tn+' 실거래</div></div></div>'
     +'<div class="rcline"><span class="led"></span><span class="rdate">'+r.d.slice(5)+'</span>'
     +'<span class="ttag '+tc+'">'+tn+'</span>'
     +'<span class="rspec">'+r.m2+'㎡('+Math.round(r.m2/3.3058)+'평)'+(r.fl?' · '+r.fl+'층':'')+'</span></div>'
     +'<div class="hint">누르시면 층·평형별 실거래 ›</div></div>';
  }
  const last=c.last?'<b>'+eok(c.last.amt)+'</b><span class="d">'+c.last.date.slice(2)+'</span>':'<b style="color:#98a4b1;font-size:13px">매매 없음</b>';
  const mid=c.mid!=null?eok(c.mid):'<span style="color:#98a4b1">표본부족</span>';
  const ppy=c.ppy!=null?Math.round(c.ppy*10000).toLocaleString()+'만':'-';
  return '<div class="card ac" onclick="goDetail(\''+c.id+'\')">'+head
   +'<div class="last">'+last+'</div></div>'
   +'<div class="grid">'
   +'<div class="g"><div class="k">대표 '+c.m2+'㎡('+Math.round(c.py)+'평)</div><div class="v">'+mid+'</div></div>'
   +'<div class="g"><div class="k">전용 평당</div><div class="v">'+ppy+'</div></div>'
   +'<div class="g"><div class="k">전세가율</div><div class="v gold">'+(c.ratio!=null?c.ratio+'%':'-')+'</div></div>'
   +'<div class="g"><div class="k">6개월 거래</div><div class="v">'+c.tot+'건</div></div>'
   +'</div><div class="hint">누르시면 층·평형별 실거래 ›</div></div>';
}

/* ── 검색 ── */
let DET_CUR=null;
$('#q').addEventListener('input',e=>{
  const q=norm(e.target.value);
  const box=$('#sres');
  if(q.length<2){box.classList.add('hide');return;}
  const hit=S.complexes.filter(c=>norm(c.nm).includes(q)).slice(0,8);
  if(!hit.length){box.innerHTML='<div class="it"><span class="mi">검색 결과가 없습니다</span></div>';box.classList.remove('hide');return;}
  box.innerHTML=hit.map(c=>'<div class="it" onclick="pick(\''+c.id+'\',\''+c.dong+'\')">'
   +'<span><span class="nm">'+c.nm+'</span>'+(c.few?'<span class="badge-few">표본 적음</span>':'')
   +'<span class="mi"> '+c.dong+'</span></span>'
   +'<span class="mi">'+c.tot+'건</span></div>').join('');
  box.classList.remove('hide');
  ga('search_use',{});
});
function pick(id,dong){$('#sres').classList.add('hide');$('#q').value='';state.dong=dong;goDetail(id);}

/* ── 상세 ── */
function renderDetail(){
  const load=DET?Promise.resolve(DET):fetch('gangseo_apt_detail.json',{cache:'no-cache'}).then(r=>r.json()).then(d=>DET=d);
  $('#view').className='ld';$('#view').textContent='단지 상세 불러오는 중…';
  load.then(()=>{
    const d=DET[state.id];
    if(!d){$('#view').textContent='단지 정보를 찾지 못했습니다.';return;}
    DET_CUR=d;setCrumb();
    const sm=S.complexes.find(c=>c.id===state.id)||{};
    if(!d._band)d._band=d.areas[0].m2;
    if(!d._tab)d._tab='sale';
    const a=d.areas.find(x=>x.m2===d._band)||d.areas[0];
    let h='<div class="det"><h2>'+d.nm+'</h2>'
     +'<div class="meta">'+d.dong+' · '+(d.yr?d.yr+'년 준공':'준공연도 미상')+(sm.un?' · '+sm.un.toLocaleString()+'세대':'')+'</div>';
    h+='<div class="bands">'+d.areas.map(x=>'<button class="'+(x.m2===a.m2?'on':'')+'" onclick="setBand('+x.m2+')">'
       +x.m2+'㎡ <span style="font-weight:700;font-size:11px">'+Math.round(x.py)+'평</span>'
       +'<span class="n">'+(x.nS+x.nJ+x.nW)+'건</span></button>').join('')+'</div>';
    const tabs=[['sale','매매 '+a.nS],['jeonse','전세 '+a.nJ],['wolse','월세 '+a.nW]];
    h+='<div class="tabs">'+tabs.map(t=>'<button class="'+(d._tab===t[0]?'on':'')+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>').join('')+'</div>';
    h+=dealBlock(a,d._tab);
    if(sm.lat){h+='<div id="map"></div>';}
    h+='<div class="note">국토부 실거래 신고분입니다. 같은 면적이라도 층·동·수리 상태에 따라 가격이 다를 수 있습니다.'
     +(a.nS<7?' 표본이 적어 참고용으로만 봐주세요.':'')+'</div>';
    h+='<button class="back" onclick="goList(\''+d.dong+'\')">‹ '+d.dong+' 단지 목록으로</button></div>';
    $('#view').className='detpad';$('#view').innerHTML=h;
    const rest=(a.nS+a.nJ+a.nW)-Math.min(5,a.nS)-Math.min(5,a.nJ)-Math.min(5,a.nW);
    const cnt=({sale:a.nS,jeonse:a.nJ,wolse:a.nW})[d._tab]-5;
    $('#fixbar').className='fixbar on';
    $('#fixbar').innerHTML=(!state.deals&&cnt>0
      ?'<button class="mo" onclick="state.deals=1;render()">+ '+cnt+'건 더보기</button>':'')
      +'<a class="db" href="dashboard.html" onclick="ga(\'cta_click\',{from:\'widget_detail\'})">📊 대시보드</a>';
    if(sm.lat)miniMap(sm.lat,sm.lng,d.nm);
    ga('apt_click',{apt:d.nm,dong:d.dong});
  });
}
function setBand(m2){DET[state.id]._band=m2;state.deals=0;render();}
function setTab(t){DET[state.id]._tab=t;state.deals=0;render();}
function cut(arr){return state.deals?arr:arr.slice(0,5);}
function dealBlock(a,tab){
  let mid='',rows='',head='';
  if(tab==='sale'){
    mid='<div class="kv"><span>중위 <b>'+(a.mid!=null?eok(a.mid):'-')+'</b></span>'
       +(a.ppy?'<span>전용 평당 <b>'+Math.round(a.ppy*10000).toLocaleString()+'만</b></span>':'')+'</div>';
    head='<tr><th>계약일</th><th>층</th><th>금액</th></tr>';
    rows=cut(a.sale).map(x=>'<tr><td class="dt">'+x.date+'</td><td>'+(x.fl||'-')+'층</td><td><b>'+eok(x.amt)+'</b></td></tr>').join('');
    if(!a.sale.length)rows='<tr><td colspan="3" class="dt">최근 6개월 매매가 없습니다</td></tr>';
  }else if(tab==='jeonse'){
    const deps=a.jeonse.map(x=>x.dep).filter(Boolean);
    const m=deps.length>=3?median(deps):null;
    mid='<div class="kv"><span>전세 중위 <b>'+(m!=null?eok(m):'-')+'</b></span></div>';
    head='<tr><th>계약일</th><th>층</th><th>보증금</th></tr>';
    rows=cut(a.jeonse).map(x=>'<tr><td class="dt">'+x.date+'</td><td>'+(x.fl||'-')+'층</td><td><b>'+eok(x.dep)+'</b></td></tr>').join('');
    if(!a.jeonse.length)rows='<tr><td colspan="3" class="dt">최근 6개월 전세가 없습니다</td></tr>';
  }else{
    head='<tr><th>계약일</th><th>층</th><th>보증금</th><th>월세</th></tr>';
    rows=cut(a.wolse).map(x=>'<tr><td class="dt">'+x.date+'</td><td>'+(x.fl||'-')+'층</td><td>'+eok(x.dep)+'</td><td><b>'+x.rent+'만</b></td></tr>').join('');
    if(!a.wolse.length)rows='<tr><td colspan="4" class="dt">최근 6개월 월세가 없습니다</td></tr>';
  }
  return mid+'<table class="deals"><thead>'+head+'</thead><tbody>'+rows+'</tbody></table>';
}
function median(a){const s=[...a].sort((x,y)=>x-y),m=s.length>>1;return s.length%2?s[m]:(s[m-1]+s[m])/2;}
function miniMap(lat,lng,nm){
  if(window.L)return draw();
  const css=document.createElement('link');css.rel='stylesheet';
  css.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';document.head.appendChild(css);
  const js=document.createElement('script');
  js.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';js.onload=draw;document.head.appendChild(js);
  function draw(){
    const m=L.map('map',{scrollWheelZoom:false}).setView([lat,lng],15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(m);
    L.marker([lat,lng]).addTo(m).bindPopup(nm).openPopup();
  }
}
document.addEventListener('click',e=>{if(!e.target.closest('.search')&&!e.target.closest('.sres'))$('#sres').classList.add('hide');});
</script>
</body>
</html>
