name: Update widget data
on:
  schedule:
    - cron: "0 16 * * *"   # KST 01:00
  workflow_dispatch:
permissions:
  contents: write
concurrency: update-data
env:
  TZ: Asia/Seoul
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt

      - name: Collect MOLIT data (강서)
        working-directory: automation
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: python collect_kangseo.py
      - name: Build widget_data.json
        working-directory: automation
        run: |
          python widget_data_builder.py data/molit_kangseo.csv 화곡동
          cp outputs/widget/widget_data.json ../widget_data.json
      - name: Build hwagok_apt_data.json
        working-directory: automation
        run: |
          python apt_widget_builder.py data/molit_kangseo.csv 화곡동
          cp outputs/widget/hwagok_apt_data.json ../hwagok_apt_data.json
      - name: Build 강서 아파트 탐색기 (위젯·대시보드)
        run: python gangseo_apt_builder.py automation/data/molit_kangseo.csv .
      - name: Build auction_data.json
        working-directory: automation
        run: |
          python auction_data.py data/molit_kangseo.csv
          cp auction_data.json ../auction_data.json
      - name: Publish CSV
        run: cp automation/data/molit_kangseo.csv molit_kangseo.csv

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add widget_data.json hwagok_apt_data.json gangseo_apt_summary.json gangseo_apt_detail.json auction_data.json molit_kangseo.csv automation/cache 2>/dev/null || true
          git commit -m "auto: data ($(date +%F))" || echo "변경 없음"
          git pull --rebase --autostash || true
          git push || echo "푸시 생략"
